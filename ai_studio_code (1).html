<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COD Process - AI Marketing Suite</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #ffffff; --bg2: #f8fafc; --bg3: #f1f5f9;
            --text: #0f172a; --text2: #334155; --text3: #64748b;
            --border: #e2e8f0; --border2: #cbd5e1;
            --accent: #d97706; --accent-bg: #fef3c7;
            --toggle-bg: #e2e8f0; --success: #10b981;
            --success-bg: #ecfdf5;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        [data-theme='dark'] {
            --bg: #09090b; --bg2: #18181b; --bg3: #27272a;
            --text: #fafafa; --text2: #d4d4d8; --text3: #a1a1aa;
            --border: #27272a; --border2: #3f3f46;
            --accent: #f59e0b; --accent-bg: #451a03;
            --toggle-bg: #27272a;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: all 0.3s ease; margin: 0; }
        .font-syne { font-family: 'Syne', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
        .markdown-body h3 { font-family: 'Syne', sans-serif; font-weight: 800; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin: 1.5rem 0 1rem; }
        .markdown-body p { margin-bottom: 1rem; line-height: 1.6; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif;">
            <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #d97706; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px; color: #666;">Loading System...</p>
        </div>
    </div>

    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";
        window.GoogleGenAI = GoogleGenAI;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // API KEY INJECTED
        const HARDCODED_API_KEY = "AIzaSyBF8ThT_rH4yczI590ztqI_TgvY54Fas2w";

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const lucideIcon = window.lucide.icons[name];
                    if (lucideIcon) {
                        window.lucide.createIcons({
                            icons: { [name]: lucideIcon },
                            attrs: { strokeWidth: 2, width: size, height: size }
                        });
                    }
                }
            }, [name, size]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        function App() {
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('cod_user')) || null);
            const [theme, setTheme] = useState(localStorage.getItem('cod_theme') || 'light');
            const [activeTab, setActiveTab] = useState('generator');
            const [apiKey] = useState(HARDCODED_API_KEY);
            
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');

            const [productName, setProductName] = useState('');
            const [productInfo, setProductInfo] = useState('');
            const [language, setLanguage] = useState('French');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [step, setStep] = useState(0);
            const [wordCounterText, setWordCounterText] = useState('');

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('cod_theme', theme);
            }, [theme]);

            const handleLogin = (e) => {
                e.preventDefault();
                setUser({ email: loginEmail, isAdmin: true });
                localStorage.setItem('cod_user', JSON.stringify({ email: loginEmail }));
            };

            const generate = async () => {
                setLoading(true);
                setResult(null);
                try {
                    const genAI = new window.GoogleGenAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    setStep(1);
                    const prompt = `Act as an expert copywriter in ${language}. Generate a product page for: ${productName}. Details: ${productInfo}. Include Hook, Intro, Benefits, Features, Specs. Format with Markdown.`;
                    const res = await model.generateContent(prompt);
                    setResult(res.response.text());
                } catch (err) { alert(err.message); }
                finally { setLoading(false); setStep(0); }
            };

            const stats = {
                words: wordCounterText.trim() ? wordCounterText.trim().split(/\s+/).length : 0,
                chars: wordCounterText.length,
                readingTime: Math.ceil((wordCounterText.trim() ? wordCounterText.trim().split(/\s+/).length : 0) / 200)
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[var(--bg)] p-4">
                        <div className="w-full max-w-md bg-[var(--bg2)] p-8 rounded-2xl border border-[var(--border)] shadow-2xl">
                            <h1 className="font-syne text-2xl font-bold text-center mb-8">COD Process Login</h1>
                            <form onSubmit={handleLogin} className="flex flex-col gap-4">
                                <input type="email" required value={loginEmail} onChange={e => setLoginEmail(e.target.value)} className="bg-[var(--bg3)] border border-[var(--border)] rounded-lg p-3 outline-none" placeholder="Email" />
                                <input type="password" required value={loginPassword} onChange={e => setLoginPassword(e.target.value)} className="bg-[var(--bg3)] border border-[var(--border)] rounded-lg p-3 outline-none" placeholder="Password" />
                                <button type="submit" className="bg-amber-600 text-white py-3 rounded-xl font-bold">Login</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <aside className="w-full md:w-[260px] md:h-screen sticky top-0 md:border-r border-[var(--border)] bg-[var(--bg2)] flex flex-col">
                        <div className="p-6 flex items-center gap-3">
                            <div className="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center text-white shadow-lg"><Icon name="ShoppingCart" /></div>
                            <h1 className="font-syne font-extrabold text-lg">COD Process</h1>
                        </div>
                        <nav className="flex-1 p-4 flex flex-col gap-2">
                            <button onClick={() => setActiveTab('generator')} className={`flex items-center gap-3 px-4 py-3 rounded-xl text-[13px] font-bold ${activeTab === 'generator' ? 'bg-amber-600 text-white' : 'text-[var(--text2)]'}`}>
                                <Icon name="Sparkles" /> PPs Generator
                            </button>
                            <button onClick={() => setActiveTab('wordcounter')} className={`flex items-center gap-3 px-4 py-3 rounded-xl text-[13px] font-bold ${activeTab === 'wordcounter' ? 'bg-amber-600 text-white' : 'text-[var(--text2)]'}`}>
                                <Icon name="Type" /> Word Counter
                            </button>
                        </nav>
                        <div className="p-4 border-t border-[var(--border)] flex flex-col gap-4">
                            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="text-xs font-bold text-[var(--text3)] uppercase">
                                {theme === 'dark' ? 'Light Mode' : 'Dark Mode'}
                            </button>
                            <button onClick={() => { setUser(null); localStorage.removeItem('cod_user'); }} className="text-xs font-bold text-red-500 uppercase">Logout</button>
                        </div>
                    </aside>

                    <main className="flex-1 max-w-[1000px] w-full mx-auto px-6 py-10">
                        {activeTab === 'generator' && (
                            <div className="animate-in">
                                <div className="bg-[var(--bg2)] border border-[var(--border)] rounded-2xl p-8 shadow-xl mb-8">
                                    <h2 className="font-syne text-xl font-bold mb-6">PPs Generator</h2>
                                    <div className="flex flex-col gap-6">
                                        <select value={language} onChange={e => setLanguage(e.target.value)} className="bg-[var(--bg3)] border border-[var(--border)] rounded-lg p-3 outline-none">
                                            <option value="French">French</option><option value="English">English</option><option value="Arabic">Arabic</option>
                                        </select>
                                        <input value={productName} onChange={e => setProductName(e.target.value)} className="bg-[var(--bg3)] border border-[var(--border)] rounded-lg p-3 outline-none" placeholder="Product Name" />
                                        <textarea value={productInfo} onChange={e => setProductInfo(e.target.value)} className="bg-[var(--bg3)] border border-[var(--border)] rounded-lg p-3 h-32 outline-none" placeholder="Product Details" />
                                        <button onClick={generate} disabled={loading} className="bg-amber-600 text-white py-4 rounded-xl font-bold">
                                            {loading ? 'AI Processing...' : 'Generate Expert Page'}
                                        </button>
                                    </div>
                                </div>
                                {result && <div className="bg-[var(--bg2)] border border-[var(--border)] rounded-2xl p-8 shadow-xl whitespace-pre-wrap text-sm">{result}</div>}
                            </div>
                        )}
                        {activeTab === 'wordcounter' && (
                            <div className="animate-in flex flex-col gap-6">
                                <div className="grid grid-cols-3 gap-4">
                                    {Object.entries(stats).map(([key, val]) => (
                                        <div key={key} className="bg-[var(--bg2)] border border-[var(--border)] rounded-xl p-4 flex flex-col items-center">
                                            <span className="text-2xl font-syne font-bold">{val}{key === 'readingTime' ? 'm' : ''}</span>
                                            <span className="text-[10px] uppercase font-bold text-[var(--text3)]">{key}</span>
                                        </div>
                                    ))}
                                </div>
                                <textarea value={wordCounterText} onChange={e => setWordCounterText(e.target.value)} className="w-full h-[400px] bg-[var(--bg2)] border border-[var(--border)] rounded-2xl p-6 outline-none" placeholder="Paste text here..." />
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
