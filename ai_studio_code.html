<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COD Process - AI Marketing Suite</title>
    
    <!-- CSS & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --bg: #ffffff; --bg2: #f8fafc; --text: #0f172a; --text3: #64748b; --border: #e2e8f0; --accent: #d97706; }
        [data-theme='dark'] { --bg: #09090b; --bg2: #18181b; --text: #fafafa; --text3: #a1a1aa; --border: #27272a; --accent: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
        .font-syne { font-family: 'Syne', sans-serif; }
        #error-display { display: none; padding: 20px; color: red; background: #fee2e2; border: 1px solid red; margin: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <!-- Error Display for Debugging -->
    <div id="error-display"></div>
    
    <!-- Root for React -->
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif;">
            <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #d97706; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px; color: #666;">Loading System...</p>
        </div>
    </div>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Gemini SDK Loader -->
    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";
        window.GoogleGenAI = GoogleGenAI;
        console.log("Gemini SDK Loaded");
    </script>

    <!-- React Code -->
    <script type="text/babel">
        // Global Error Catching
        window.onerror = function(msg, url, line) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML = `<b>Error:</b> ${msg} <br> <b>Line:</b> ${line}`;
            return false;
        };

        const { useState, useEffect, useRef } = React;

        // Icon Component
        const Icon = ({ name, size = 20 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const lucideIcon = window.lucide.icons[name];
                    if (lucideIcon) {
                        window.lucide.createIcons({
                            icons: { [name]: lucideIcon },
                            attrs: { "stroke-width": 2, width: size, height: size }
                        });
                    }
                }
            }, [name, size]);
            return <i data-lucide={name} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        function App() {
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('cod_user')) || null);
            const [activeTab, setActiveTab] = useState('generator');
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showKeyInput, setShowKeyInput] = useState(!localStorage.getItem('gemini_api_key'));
            
            const [productName, setProductName] = useState('');
            const [productInfo, setProductInfo] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                const userData = { email: 'user@example.com' };
                setUser(userData);
                localStorage.setItem('cod_user', JSON.stringify(userData));
            };

            const generate = async () => {
                if (!apiKey) { setShowKeyInput(true); return; }
                setLoading(true);
                try {
                    if (!window.GoogleGenAI) throw new Error("Gemini SDK not ready. Please refresh.");
                    const genAI = new window.GoogleGenAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const prompt = `Generate a professional e-commerce product page for: ${productName}. Details: ${productInfo}.`;
                    const res = await model.generateContent(prompt);
                    setResult(res.response.text());
                } catch (err) {
                    alert(err.message);
                } finally {
                    setLoading(false);
                }
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[var(--bg)] p-4">
                        <div className="w-full max-w-md bg-[var(--bg2)] p-8 rounded-2xl border border-[var(--border)] shadow-xl text-center">
                            <h1 className="font-syne text-2xl font-bold mb-6">COD Process Login</h1>
                            <form onSubmit={handleLogin} className="flex flex-col gap-4">
                                <input type="email" placeholder="Email" className="p-3 border rounded-lg outline-none" required />
                                <input type="password" placeholder="Password" className="p-3 border rounded-lg outline-none" required />
                                <button type="submit" className="bg-amber-600 text-white py-3 rounded-xl font-bold">Login</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {showKeyInput && (
                        <div className="fixed inset-0 z-[100] bg-black/50 flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-2xl max-w-md w-full">
                                <h2 className="font-bold mb-4">Enter Gemini API Key</h2>
                                <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full p-3 border rounded-lg mb-4" placeholder="API Key..." />
                                <button onClick={() => { localStorage.setItem('gemini_api_key', apiKey); setShowKeyInput(false); }} className="w-full bg-amber-600 text-white py-3 rounded-xl font-bold">Save</button>
                            </div>
                        </div>
                    )}

                    <aside className="w-full md:w-64 bg-[var(--bg2)] border-r border-[var(--border)] p-6">
                        <h1 className="font-syne font-bold text-xl mb-8">COD Process</h1>
                        <nav className="flex flex-col gap-2">
                            <button onClick={() => setActiveTab('generator')} className={`p-3 rounded-xl font-bold text-left ${activeTab === 'generator' ? 'bg-amber-600 text-white' : ''}`}>PPs Generator</button>
                            <button onClick={() => { setUser(null); localStorage.removeItem('cod_user'); }} className="p-3 text-red-500 font-bold text-left">Logout</button>
                        </nav>
                    </aside>

                    <main className="flex-1 p-6 md:p-12 max-w-4xl mx-auto w-full">
                        <div className="bg-[var(--bg2)] p-8 rounded-2xl border border-[var(--border)] shadow-sm">
                            <h2 className="font-syne text-2xl font-bold mb-6">Product Generator</h2>
                            <div className="flex flex-col gap-4">
                                <input value={productName} onChange={e => setProductName(e.target.value)} placeholder="Product Name" className="p-3 border rounded-lg" />
                                <textarea value={productInfo} onChange={e => setProductInfo(e.target.value)} placeholder="Product Details" className="p-3 border rounded-lg h-32" />
                                <button onClick={generate} disabled={loading} className="bg-amber-600 text-white py-4 rounded-xl font-bold">
                                    {loading ? 'Processing...' : 'Generate Page'}
                                </button>
                            </div>
                        </div>
                        {result && (
                            <div className="mt-8 bg-white p-8 rounded-2xl border border-[var(--border)] shadow-sm whitespace-pre-wrap">
                                {result}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
